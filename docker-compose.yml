version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: celpip_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: celpip_db
    ports:
      - "5432:5432"
    volumes:
      - celpip_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celpip_api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  celpip_pgdata:
